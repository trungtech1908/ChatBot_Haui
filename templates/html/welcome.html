<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sinh Viên - {{ username }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter', 'sans-serif'] },
                colors: { 'primary-blue': '#1e40af', 'secondary-gray': '#f3f4f6' }
            }}
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('css', filename='layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('css', filename='components.css') }}">
</head>
<body id="app" class="flex flex-col h-full font-sans">

    <header class="bg-primary-blue text-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold">Hệ thống Quản lý Sinh viên</h1>
        <div class="text-sm flex items-center space-x-4">
            <span>Xin chào, <span class="font-semibold">{{ username }}</span></span>
            <a href="{{ url_for('logout') }}" class="px-3 py-1 bg-red-500 hover:bg-red-600 rounded text-white text-xs font-bold">
                <i class="fas fa-sign-out-alt mr-1"></i> Đăng xuất
            </a>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        {% include 'sidebar_menu.html' %}
        {% include 'main_content.html' %}
    </main>

    <script src="{{ url_for('js', filename='script.js') }}"></script>
</body>
</html>
