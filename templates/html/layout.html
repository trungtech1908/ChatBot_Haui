<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Sinh viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components.css') }}">
</head>
<body class="flex flex-col h-screen bg-gray-100 font-sans">

    <header class="bg-blue-800 text-white shadow-md h-16 flex items-center justify-between px-6 z-20 flex-shrink-0">
        <div class="flex items-center">
            <h1 class="text-xl font-bold tracking-wide uppercase">Hệ thống Quản lý Sinh viên</h1>
        </div>
        
        <div class="flex items-center space-x-4 text-sm">
            <span>Xin chào, <span class="font-bold text-yellow-300">{{ username }}</span></span>
            
            <a href="/logout" class="flex items-center px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white rounded shadow transition duration-150">
                <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
            </a>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        {% include "html/sidebar_menu.html" %}

        <main class="flex-1 overflow-y-auto bg-gray-100 p-6 relative">
            
            {% if error_data %}
                <div class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded flex items-center shadow-sm">
                    <i class="fas fa-exclamation-circle text-xl mr-3"></i>
                    <span>{{ error_data }}</span>
                </div>
            {% endif %}
            
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', path='javascript/script.js') }}"></script>
</body>
</html>
